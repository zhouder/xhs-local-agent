<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}XHS Local Agent{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><rect width=%2216%22 height=%2216%22 rx=%223%22 fill=%22%233157a4%22/></svg>">
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
  <header class="topbar">
    <strong>XHS Local Agent</strong>
    <span class="badge">Safe publish workflow</span>
  </header>
  <nav class="nav">
    <a href="/">Dashboard</a>
    <a href="/notes">草稿</a>
    <a href="/plans">内容计划</a>
    <a href="/audit">审计日志</a>
    <a href="/records/errors">浏览器错误</a>
    <a href="/records/commands">命令事件</a>
    <a href="/settings">设置</a>
  </nav>
  <main class="main">
    {% if message %}<p class="alert success">{{ message }}</p>{% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
